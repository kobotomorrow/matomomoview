name: Deploy

on:
  schedule:
    - cron: '0 5 * * *'
      timezone: Asia/Tokyo
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  DUCKDB_VERSION: 1.5.2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install DuckDB
        run: |
          curl https://install.duckdb.org | DUCKDB_VERSION=${DUCKDB_VERSION} sh
          echo "$HOME/.duckdb/cli/latest" >> "$GITHUB_PATH"
          "$HOME/.duckdb/cli/latest/duckdb" --version

      - name: Build
        env:
          RUNNING_DISTANCE_PARQUET_URI: ${{ secrets.RUNNING_DISTANCE_PARQUET_URI }}
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync dist "s3://${{ secrets.DEPLOY_S3_BUCKET }}" --delete

      - name: Create CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths '/*'
