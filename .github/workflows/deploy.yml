name: Deploy

on:
  schedule:
    - cron: '0 1 * * *' # JST 10:00
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  DUCKDB_VERSION: 1.5.2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install DuckDB
        run: |
          curl https://install.duckdb.org | DUCKDB_VERSION=${DUCKDB_VERSION} sh
          echo "$HOME/.duckdb/cli/latest" >> "$GITHUB_PATH"
          "$HOME/.duckdb/cli/latest/duckdb" --version

      - name: Build
        env:
          RUNNING_DISTANCE_PARQUET_URI: ${{ secrets.RUNNING_DISTANCE_PARQUET_URI }}
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync dist "s3://${{ secrets.DEPLOY_S3_BUCKET }}" --delete

      - name: Create CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths '/*'
